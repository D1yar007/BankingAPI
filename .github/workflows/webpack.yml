name: Node.js CI with SonarQube

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем исходный код репозитория
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Важно для корректного анализа истории изменений в Sonar

    # 2. Настраиваем окружение Node.js
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Укажите версию Node.js, которая вам нужна (18, 20, 22)
        cache: 'npm'

    # 3. Устанавливаем зависимости проекта
    - name: Install dependencies
      run: npm ci

    # 4. Запускаем сборку (если используется Webpack/сборщик)
    - name: Build project
      run: npm run build --if-present

    # 5. Запускаем официальный сканер SonarQube
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v4
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
